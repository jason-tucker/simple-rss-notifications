# simple-rss-notifications — Docker Compose stack.
#
# Three application services + Postgres + Watchtower.
#
#   caddy   — ingress, fronted by Cloudflare Tunnel (cloudflared runs standalone
#             on the host, NOT in this stack — see VPS_SETUP.md).
#   web     — Next.js dashboard. UI + API routes only.
#   worker  — Long-running poller/dispatcher. SAME image as web, different
#             command — exists separately so web restarts don't bounce in-flight
#             RSS dispatches and so scaling web later doesn't double-poll.
#   db      — Postgres 16. No host port; reachable only over srn-net.
#
# NEVER add `ports: ["x:y"]` (0.0.0.0). Only Caddy gets a loopback bind so
# cloudflared on the host can reach it.

services:
  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/jason-tucker/simple-rss-notifications:latest}
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      PORT: ${PORT:-6082}
      NEXT_HOST: ${NEXT_HOST:-next-srn}
    # Loopback ONLY — cloudflared (host) reaches us at 127.0.0.1:${PORT}.
    # Not reachable from the public internet directly.
    ports:
      - "127.0.0.1:${PORT:-6082}:${PORT:-6082}"
    networks:
      - srn-net
    depends_on:
      - web
    # Resource caps + hardening. Values are conservative for a small VPS;
    # operators can tune mem_limit/cpus to their host.
    mem_limit: 128m
    cpus: 0.50
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # HTTP check on Caddy's loopback listen port. The caddy:*-alpine image is
    # Alpine/BusyBox, so `wget` is always present (curl is not). In steady
    # state `/` reverse-proxies to web and returns 200; if web is down Caddy
    # still answers from its handle_errors 502 page, but that 5xx makes wget
    # exit non-zero — which is acceptable: an ingress that can only serve the
    # error page SHOULD read as unhealthy. Tune interval/retries to taste.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${PORT:-6082}/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${WEB_IMAGE:-ghcr.io/jason-tucker/simple-rss-notifications-web:latest}
    build:
      context: ./web
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        BUILD_VERSION: ${BUILD_VERSION:-0.0.0}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-srn}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-srn}
      SRN_ROLE: web
    expose:
      - "3000"
    networks:
      srn-net:
        aliases:
          - ${NEXT_ALIAS:-next-srn}
    depends_on:
      db:
        condition: service_healthy
    # Resource caps + hardening. Conservative defaults for a small VPS that
    # OOMs easily; operators can raise mem_limit/cpus on bigger hosts.
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # HTTP liveness against the in-container Next server. The node:alpine
    # runner has no curl/wget, so use node's built-in fetch. /login is a
    # public static page (allowlisted in middleware) that returns 200.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ${WEB_IMAGE:-ghcr.io/jason-tucker/simple-rss-notifications-web:latest}
    # Same image as web, different role. Worker reads SRN_ROLE=worker
    # and runs the poller/dispatcher loop instead of the HTTP server.
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-srn}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-srn}
      SRN_ROLE: worker
    command: ["node", "dist/worker/index.js"]
    networks:
      - srn-net
    depends_on:
      db:
        condition: service_healthy
    # Resource caps + hardening. The worker is the OOM-prone process (RSS
    # fetch + parse), so cap it tighter than web; raise on bigger hosts.
    mem_limit: 384m
    cpus: 1.0
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The worker has no HTTP server, so we can't curl it. It is PID 1 in this
    # container: if the node process dies the container exits outright and
    # `restart: unless-stopped` recovers it — that, not this healthcheck, is
    # the real liveness guarantee. We add a shallow presence check anyway so
    # `docker ps` shows a health state. CAVEAT: `pgrep -f` also matches the
    # healthcheck's own `sh -c` arg (which contains "dist/worker"), so this
    # check effectively just confirms "a shell is running" — it cannot report
    # a false-unhealthy, and cannot mask a dead worker (PID 1 == container
    # lifetime). A real progress signal lives in the worker_heartbeats table
    # but is intentionally NOT queried here to keep the check DB-decoupled.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'dist/worker' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    # Pinned to a specific patch tag (not floating `16-alpine`). Bump
    # deliberately. Follow-up: pin by `@sha256:` digest + cosign verify.
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-srn}
      POSTGRES_USER: ${POSTGRES_USER:-srn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - srn-db-data:/var/lib/postgresql/data
    networks:
      - srn-net
    # Resource caps + no-new-privileges. NOTE: we intentionally do NOT
    # cap_drop ALL on db — the postgres entrypoint chowns the data dir and
    # drops from root to the postgres user on first init, which needs CHOWN /
    # SETUID / SETGID. Leaving caps at the Docker default is the safe choice;
    # tightening them is a possible follow-up if the exact set is verified.
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - "no-new-privileges:true"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srn} -d ${POSTGRES_DB:-srn}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: no per-stack watchtower. The host runs a single nickfedor/watchtower
  # (the maintained fork — containrrr/watchtower's :latest no longer supports
  # this VPS's Docker API). It already polls every container labelled
  # `com.centurylinklabs.watchtower.enable=true` across ALL compose stacks,
  # so our caddy/web/worker containers above are picked up automatically.

networks:
  srn-net:
    driver: bridge

volumes:
  srn-db-data:
